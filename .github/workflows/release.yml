name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & zip Chrome
        run: npm run zip

      - name: Build & zip Firefox
        run: npm run zip:firefox

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          cp ".output/auths-${PKG_VERSION}-chrome.zip" ".output/auths-chrome-${VERSION}.zip"
          cp ".output/auths-${PKG_VERSION}-firefox.zip" ".output/auths-firefox-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .output/auths-chrome-${{ steps.version.outputs.VERSION }}.zip
            .output/auths-firefox-${{ steps.version.outputs.VERSION }}.zip
