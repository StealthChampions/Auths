name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag exists
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} does not exist, will create release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & zip Chrome
        run: npm run zip

      - name: Build & zip Firefox
        run: npm run zip:firefox

      - name: Build & zip Edge
        run: npm run zip:edge

      - name: Rename artifacts
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          cp ".output/auths-${PKG_VERSION}-chrome.zip" ".output/auths-chrome-${VERSION}.zip"
          cp ".output/auths-${PKG_VERSION}-firefox.zip" ".output/auths-firefox-${VERSION}.zip"
          cp ".output/auths-${PKG_VERSION}-edge.zip" ".output/auths-edge-${VERSION}.zip"

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            .output/auths-chrome-${{ needs.check-version.outputs.version }}.zip
            .output/auths-firefox-${{ needs.check-version.outputs.version }}.zip
            .output/auths-edge-${{ needs.check-version.outputs.version }}.zip
